<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Bike path type tracer</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  #app { display: flex; height: 100%; }
  #sidebar { width: 340px; flex: 0 0 340px; height: 100%; overflow-y: auto; background: #f7f7f4; border-right: 1px solid #ddd; padding: 14px; }
  #map { flex: 1; height: 100%; }
  h1 { font-size: 16px; margin: 0 0 8px; }
  .hint { font-size: 12px; color: #555; line-height: 1.45; margin: 0 0 12px; }
  .hint kbd { background: #fff; border: 1px solid #ccc; border-radius: 4px; padding: 0 4px; font-size: 11px; }
  .types { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
  .type-btn { display: flex; align-items: center; gap: 8px; padding: 8px; border: 2px solid transparent; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 12px; line-height: 1.25; }
  .type-btn.active { border-color: #111; background: #fffbe8; }
  .type-btn .num { font-weight: 700; color: #888; width: 12px; }
  .swatch { width: 22px; height: 10px; border-radius: 6px; flex: 0 0 22px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.15); }
  .toggles { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; font-size: 13px; }
  .actions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
  button.op { padding: 7px 10px; border: 1px solid #bbb; border-radius: 7px; background: #fff; cursor: pointer; font-size: 12px; }
  button.op:hover { background: #eee; }
  button.primary { background: #111; color: #fff; border-color: #111; }
  .seg-list { display: flex; flex-direction: column; gap: 4px; margin: 6px 0 12px; }
  .seg { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 4px 6px; border-radius: 6px; background: #fff; }
  .seg .dot { width: 12px; height: 12px; border-radius: 50%; flex: 0 0 12px; box-shadow: inset 0 0 0 1px rgba(0,0,0,.2); }
  .seg .len { color: #666; margin-left: auto; font-variant-numeric: tabular-nums; }
  .seg .del { cursor: pointer; color: #b00; font-weight: 700; padding: 0 4px; }
  .summary { font-size: 12px; }
  .summary .row { display: flex; align-items: center; gap: 7px; padding: 2px 0; }
  .summary .row .len { margin-left: auto; font-variant-numeric: tabular-nums; }
  #status { font-size: 12px; color: #333; background: #fff; border: 1px solid #ddd; border-radius: 7px; padding: 7px; margin-bottom: 12px; }
  .file-row { font-size: 12px; margin-top: 6px; }
  h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .04em; color: #888; margin: 14px 0 6px; }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>Bike path type tracer</h1>
    <p class="hint">
      Pick a type, then <b>click</b> along the route to draw a line. <b>Double-click</b> or
      <kbd>Enter</kbd> finishes it. <kbd>Backspace</kbd> undoes a point, <kbd>Esc</kbd> cancels.
      Keys <kbd>1</kbd>–<kbd>5</kbd> switch type. Export when done.
    </p>
    <div class="types" id="types"></div>

    <div class="toggles">
      <label><input type="checkbox" id="snap" checked /> Snap to ridden route (≤20 m)</label>
      <label><input type="checkbox" id="showref" checked /> Show ridden route (gray)</label>
    </div>

    <div class="actions">
      <button class="op primary" id="finish">Finish segment</button>
      <button class="op" id="undo">Undo point</button>
      <button class="op" id="cancel">Cancel line</button>
    </div>

    <div id="status">Ready.</div>

    <h2>Segments</h2>
    <div class="seg-list" id="segs"></div>

    <h2>Total length by type</h2>
    <div class="summary" id="summary"></div>

    <h2>Save / load</h2>
    <div class="actions">
      <button class="op primary" id="export">Export GeoJSON</button>
    </div>
    <div class="file-row">
      Load GeoJSON to continue: <input type="file" id="import" accept=".geojson,.json" />
    </div>
  </div>
  <div id="map"></div>
</div>

<script>
const TYPES = [
  { key: 'separated_decent', label: 'Separated bike lane – decent quality – asphalt', color: '#22a844' },
  { key: 'separated_basic',  label: 'Separated bike lane – basic quality – asphalt',  color: '#f2c200' },
  { key: 'separated_tiles',  label: 'Separated bike lane – bad quality, pavement – tiles', color: '#e02020' },
  { key: 'nonseparated',     label: 'Non-separated street – asphalt',                  color: '#f08000' },
  { key: 'construction',     label: 'Construction work – significant changed situation', color: '#38b6ff' },
];
const REFPTS = (REF.r1 || []).concat(REF.r2 || []);

let active = 0;
let current = { latlngs: [], line: null, markers: [] };
let preview = null;
let segments = [];

const map = L.map('map', { doubleClickZoom: false }).setView([48.1492, 11.5748], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 20, attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

const refLayer = L.layerGroup().addTo(map);
for (const r of [REF.r1, REF.r2]) {
  if (r && r.length) L.polyline(r, { color: '#888', weight: 5, opacity: 0.5 }).addTo(refLayer);
}

function fmtLen(m) { return m >= 1000 ? (m / 1000).toFixed(2) + ' km' : Math.round(m) + ' m'; }
function lineLength(latlngs) {
  let s = 0;
  for (let i = 1; i < latlngs.length; i++) s += map.distance(latlngs[i - 1], latlngs[i]);
  return s;
}
function snap(latlng) {
  if (!document.getElementById('snap').checked) return [latlng.lat, latlng.lng];
  let best = null, bd = 20;
  for (const p of REFPTS) {
    const d = map.distance(latlng, L.latLng(p[0], p[1]));
    if (d < bd) { bd = d; best = p; }
  }
  return best ? [best[0], best[1]] : [latlng.lat, latlng.lng];
}

function renderTypes() {
  const el = document.getElementById('types');
  el.innerHTML = '';
  TYPES.forEach((t, i) => {
    const b = document.createElement('button');
    b.className = 'type-btn' + (i === active ? ' active' : '');
    b.innerHTML = `<span class="num">${i + 1}</span><span class="swatch" style="background:${t.color}"></span><span>${t.label}</span>`;
    b.onclick = () => { active = i; renderTypes(); if (current.line) current.line.setStyle({ color: TYPES[active].color }); };
    el.appendChild(b);
  });
}

function clearMarkers() { current.markers.forEach(m => map.removeLayer(m)); current.markers = []; }
function redrawCurrent() {
  if (current.line) map.removeLayer(current.line);
  clearMarkers();
  if (current.latlngs.length) {
    current.line = L.polyline(current.latlngs, { color: TYPES[active].color, weight: 5 }).addTo(map);
    current.latlngs.forEach(ll => current.markers.push(
      L.circleMarker(ll, { radius: 3, color: '#111', fillColor: '#fff', fillOpacity: 1, weight: 1 }).addTo(map)
    ));
  } else {
    current.line = null;
  }
  updateStatus();
}
function setPreview(latlng) {
  if (preview) { map.removeLayer(preview); preview = null; }
  if (current.latlngs.length && latlng) {
    const last = current.latlngs[current.latlngs.length - 1];
    preview = L.polyline([last, [latlng.lat, latlng.lng]], { color: TYPES[active].color, weight: 3, dashArray: '4 5', opacity: 0.7 }).addTo(map);
  }
}

function commitSegment(latlngs, typeIdx) {
  const line = L.polyline(latlngs, { color: TYPES[typeIdx].color, weight: 6 }).addTo(map);
  const seg = { type: typeIdx, latlngs, line };
  line.on('click', (e) => {
    L.DomEvent.stopPropagation(e);
    L.popup().setLatLng(e.latlng)
      .setContent(`<b>${TYPES[typeIdx].label}</b><br>${fmtLen(lineLength(latlngs))}<br><button onclick="deleteSeg(${segments.indexOf(seg)})">Delete this segment</button>`)
      .openOn(map);
  });
  segments.push(seg);
  renderSegs();
}
window.deleteSeg = function (i) {
  if (i < 0 || i >= segments.length) return;
  map.removeLayer(segments[i].line);
  segments.splice(i, 1);
  map.closePopup();
  renderSegs();
};

function finish() {
  if (current.latlngs.length >= 2) commitSegment(current.latlngs.slice(), active);
  current.latlngs = [];
  redrawCurrent();
  setPreview(null);
}
function cancelLine() { current.latlngs = []; redrawCurrent(); setPreview(null); }
function undoPoint() { current.latlngs.pop(); redrawCurrent(); }

function renderSegs() {
  const el = document.getElementById('segs');
  el.innerHTML = '';
  segments.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'seg';
    d.innerHTML = `<span class="dot" style="background:${TYPES[s.type].color}"></span><span>${TYPES[s.type].label}</span><span class="len">${fmtLen(lineLength(s.latlngs))}</span><span class="del" title="delete">×</span>`;
    d.querySelector('.del').onclick = () => deleteSeg(i);
    el.appendChild(d);
  });
  renderSummary();
}
function renderSummary() {
  const el = document.getElementById('summary');
  el.innerHTML = '';
  const totals = TYPES.map(() => 0);
  for (const s of segments) totals[s.type] += lineLength(s.latlngs);
  const grand = totals.reduce((a, b) => a + b, 0);
  TYPES.forEach((t, i) => {
    const pct = grand ? Math.round(100 * totals[i] / grand) : 0;
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="swatch" style="background:${t.color}"></span><span>${t.label.split('–')[0].trim()}</span><span class="len">${fmtLen(totals[i])} · ${pct}%</span>`;
    el.appendChild(row);
  });
}
function updateStatus() {
  document.getElementById('status').textContent =
    current.latlngs.length
      ? `Drawing "${TYPES[active].label.split('–')[0].trim()}" · ${current.latlngs.length} point(s). Double-click / Enter to finish.`
      : `Ready. Selected: ${TYPES[active].label.split('–')[0].trim()}.`;
}

map.on('click', (e) => { current.latlngs.push(snap(e.latlng)); redrawCurrent(); setPreview(e.latlng); });
map.on('mousemove', (e) => setPreview(e.latlng));
map.on('dblclick', () => { current.latlngs.pop(); finish(); });

document.getElementById('finish').onclick = finish;
document.getElementById('undo').onclick = undoPoint;
document.getElementById('cancel').onclick = cancelLine;
document.getElementById('showref').onchange = (e) => { e.target.checked ? refLayer.addTo(map) : map.removeLayer(refLayer); };

window.addEventListener('keydown', (e) => {
  if (e.key >= '1' && e.key <= String(TYPES.length)) { active = +e.key - 1; renderTypes(); updateStatus(); if (current.line) current.line.setStyle({ color: TYPES[active].color }); }
  else if (e.key === 'Enter') finish();
  else if (e.key === 'Backspace') { e.preventDefault(); undoPoint(); }
  else if (e.key === 'Escape') cancelLine();
});

document.getElementById('export').onclick = () => {
  const fc = {
    type: 'FeatureCollection',
    features: segments.map(s => ({
      type: 'Feature',
      properties: { path_type: TYPES[s.type].key, label: TYPES[s.type].label, color: TYPES[s.type].color },
      geometry: { type: 'LineString', coordinates: s.latlngs.map(([lat, lng]) => [lng, lat]) },
    })),
  };
  const blob = new Blob([JSON.stringify(fc, null, 2)], { type: 'application/geo+json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'bike-path-types.geojson';
  a.click();
};

document.getElementById('import').onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const fc = JSON.parse(reader.result);
      for (const f of fc.features || []) {
        if (f.geometry?.type !== 'LineString') continue;
        let idx = TYPES.findIndex(t => t.key === f.properties?.path_type);
        if (idx < 0) idx = TYPES.findIndex(t => t.color === f.properties?.color);
        if (idx < 0) idx = 0;
        commitSegment(f.geometry.coordinates.map(([lng, lat]) => [lat, lng]), idx);
      }
    } catch (err) { alert('Could not parse GeoJSON: ' + err.message); }
  };
  reader.readAsText(file);
};

renderTypes();
renderSegs();
updateStatus();
</script>
</body>
</html>
